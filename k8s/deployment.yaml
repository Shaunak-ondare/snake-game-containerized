apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quote-app-deployment
  template:
    metadata:
      labels:
        app: quote-app-deployment
    spec:
      containers:
      - name: quote-app
        image: quote-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: web
