<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Jobs Quote</title>
    <meta name="description" content="A beautiful Steve Jobs quote with dynamic gradient and particles.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>
    <main class="content-wrapper">
        <blockquote class="quote-container">
            <p class="quote">"Innovation distinguishes between a leader and a follower."</p>
            <footer class="author">— Steve Jobs</footer>
        </blockquote>
    </main>

    <!-- Particles.js library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
